version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: companyiq
    ports:
      - "3000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8000
    volumes:
      # Mount source for live reload in dev; remove in prod
      - ./backend:/app/backend:ro
      - ./frontend:/app/frontend:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: dev variant with hot-reload
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: companyiq-dev
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - .:/app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    profiles:
      - dev
